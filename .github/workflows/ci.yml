name: CI

on:
  push:
    branches: ["master", "feature/**"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -scheme Wayfinder -project Wayfinder.xcodeproj

      # Build the full app (SwiftUI entry point + Dynamic Island widget) for a
      # real iOS Simulator so the UI compiles, not just the headless package.
      # Use the generic "Any iOS Simulator Device" destination so the build is
      # resilient to which specific simulator runtimes the runner image ships —
      # a hard-coded device (e.g. "iPhone 15") breaks when that runtime is absent.
      - name: Build Wayfinder (iOS Simulator)
        run: |
          xcodebuild build \
            -scheme Wayfinder \
            -project Wayfinder.xcodeproj \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug

  test:
    runs-on: macos-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      # The decoupled logic-layer (CompassMath + CompassViewModel, driven by
      # mock providers — no device/CoreLocation needed) lives in the local
      # SwiftPM package WayfinderKit. Testing the package directly via its
      # auto-synthesized scheme (Xcode reads Package.swift and synthesizes the
      # 'WayfinderKit' workspace + scheme itself) avoids the XcodeGen app
      # scheme, which has no test action for the package. (The '-Package'
      # suffix only applies to packages embedded inside an app's workspace.)
      #
      # Use 'platform=iOS Simulator,OS=latest' WITHOUT a hard-coded device
      # name: xcodebuild resolves a simulator for the latest available OS on
      # the runner. Pinning 'name=iPhone 17' (or any specific device) breaks
      # when a runner image ships a different default simulator set — a latent
      # flake. This mirrors the build step's resilient generic-destination
      # intent.
      - name: Test WayfinderKit logic
        run: |
          cd WayfinderKit
          xcodebuild test \
            -scheme WayfinderKit \
            -destination 'platform=iOS Simulator,OS=latest' \
            -configuration Debug \
            -only-testing WayfinderKitTests
