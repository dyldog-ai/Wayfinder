name: Wayfinder
options:
  bundleIdPrefix: com.dylanelliott
  deploymentTarget:
    iOS: "16.1"
  createIntermediateGroups: true
  generateEmptyDirectories: true

# This project is generated by XcodeGen for CI / non-Tuist builds. The Tuist
# files (Project.swift, Tuist/) remain for local development with `tuist`.
# `WayfinderKit` is a local SwiftPM package; its `DylKit` dependency is pulled
# from GitHub, so no sibling checkout is required.

packages:
  WayfinderKit:
    path: WayfinderKit
  Alamofire:
    url: https://github.com/Alamofire/Alamofire
    from: 5.4.3
  SnapKit:
    url: https://github.com/SnapKit/SnapKit
    from: 5.0.1
  # NOTE: SwiftyDraw + ChromaColorPicker are only used by the FinderCreator
  # target and no longer compile under the current Swift toolchain. They are
  # intentionally omitted here because this XcodeGen project only builds the
  # Wayfinder app + compass widget. The Tuist Project.swift still references
  # them for local multi-app development.

targets:
  Wayfinder:
    type: application
    platform: iOS
    sources:
      - path: Single_Apps/Wayfinder/Sources
      - path: Single_Apps/Wayfinder/Resources
      - path: Single_Apps/Wayfinder Shared/Sources
      - path: Single_Apps/Wayfinder Shared/Resources
    dependencies:
      - package: WayfinderKit
      - package: Alamofire
      - package: SnapKit
      - target: WayfinderCompassWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dylanelliott.Wayfinder
        PRODUCT_NAME: Wayfinder
        INFOPLIST_FILE: Single_Apps/Wayfinder/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "16.1"
        TARGETED_DEVICE_FAMILY: "1"
        NSLocationWhenInUseUsageDescription: "Location is required to show you to your destinations"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "6CW3378X23"
        ENABLE_BITCODE: "NO"
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

  WayfinderCompassWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: WayfinderCompassWidget/Sources
      - path: WayfinderCompassWidget/Resources
      - path: WayfinderCompassWidget/Assets.xcassets
    dependencies:
      - package: WayfinderKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dylanelliott.Wayfinder.CompassWidget
        PRODUCT_NAME: WayfinderCompassWidget
        INFOPLIST_FILE: WayfinderCompassWidget/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "16.1"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "6CW3378X23"
        ENABLE_BITCODE: "NO"
        SKIP_INSTALL: "YES"
